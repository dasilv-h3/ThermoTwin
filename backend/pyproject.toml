[tool.ruff]
target-version = "py313"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.ruff.lint.per-file-ignores]
# Les prompts LLM contiennent du texte natural-language en français : couper
# les lignes au milieu d'une phrase changerait le contenu envoyé au modèle.
"app/ai/prompts.py" = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.anyio]
backend = "asyncio"