name: Backend CI

on:
  push:
    branches: [main, develop]
    paths: [backend/**]
  pull_request:
    branches: [main, develop]
    paths: [backend/**]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install ruff
        run: pip install ruff==0.11.4

      - name: Check formatting
        run: ruff format --check .

      - name: Check linting
        run: ruff check .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: thermotwin
          POSTGRES_PASSWORD: thermotwin
          POSTGRES_DB: thermotwin
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongo:
        image: mongo:7.0
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: thermotwin
        ports:
          - 27017:27017

    env:
      MONGO_URL: mongodb://root:thermotwin@localhost:27017/?authSource=admin
      MONGO_DB_NAME: thermotwin
      POSTGRES_URL: postgresql+psycopg://thermotwin:thermotwin@localhost:5432/thermotwin
      JWT_SECRET: ci-test-secret
      DEBUG: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build backend/ -t thermotwin-api:${{ github.sha }}